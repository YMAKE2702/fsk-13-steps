<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ФСК · Пилот 13 шагов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-2: #FAFAFA;
    --surface-3: #F5F5F5;
    --border: #E5E5E5;
    --border-strong: #D4D4D4;
    --text: #0A0A0A;
    --text-2: #525252;
    --text-3: #A3A3A3;
    --accent: #E63946;
    --accent-hover: #C5293A;
    --accent-soft: #FEF2F3;
    --accent-tint: #FEE7E9;
    --warn: #B45309; --warn-bg: #FFFBEB;
    --blocker: #B91C1C; --blocker-bg: #FEF2F2;
    --g1: #B45309; --g1-bg: #FFFBEB; --g1-border: #FDE68A;
    --g2: #1D4ED8; --g2-bg: #EFF6FF; --g2-border: #BFDBFE;
    --g3: #15803D; --g3-bg: #F0FDF4; --g3-border: #BBF7D0;
    --r-sm: 2px; --r-md: 4px; --r-lg: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'tnum' 1;
  }
  body { min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; font-size: inherit; color: inherit; }
  ::selection { background: var(--accent); color: #fff; }

  /* Header */
  /* Topbar — logo + brand + tabs in one row */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 40px; position: sticky; top: 0; z-index: 100; }
  .topbar-row { display: flex; align-items: stretch; gap: 28px; max-width: 1600px; margin: 0 auto; min-height: 64px; }
  .logo { display: flex; align-items: center; gap: 14px; padding-right: 22px; border-right: 1px solid var(--border); flex-shrink: 0; }
  .logo-mark { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .brand-meta { display: flex; flex-direction: column; min-width: 0; gap: 2px; justify-content: center; }
  .brand-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); font-weight: 500; }
  .brand-title { font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.015em; white-space: nowrap; }

  /* Tabs — now sit on the same row as the logo */
  .tabs { display: flex; gap: 0; flex: 1; align-items: stretch; flex-wrap: wrap; }
  .tab { background: none; border: none; padding: 0 22px; font-size: 13px; font-weight: 600; color: var(--text-3); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: color 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .tab:first-child { padding-left: 0; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 1px 6px; color: var(--text-3); font-weight: 500; background: var(--surface-3); border-radius: 2px; letter-spacing: 0; }
  .tab.active .tab-count { background: var(--text); color: var(--surface); }

  /* Topbar actions — upload/download buttons */
  .topbar-actions { display: flex; align-items: center; gap: 8px; padding-left: 16px; border-left: 1px solid var(--border); flex-shrink: 0; }
  .topbar-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 12px; font-size: 12px; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; font-family: 'Manrope', sans-serif; }
  .topbar-btn:hover { background: var(--surface-2); border-color: var(--text); color: var(--text); }
  .topbar-btn svg { width: 14px; height: 14px; }
  .topbar-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .topbar-btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }

  /* Upload toast — slides in from top right */
  .upload-toast {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 200;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    padding: 16px 20px;
    box-shadow: 0 8px 24px rgba(10, 10, 10, 0.12);
    border-radius: var(--r-sm);
    font-size: 13px;
    line-height: 1.5;
    opacity: 0;
    transform: translateX(20px);
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .upload-toast.show { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .upload-toast.success { border-left-color: #15803D; }
  .upload-toast.error { border-left-color: var(--blocker); }
  .upload-toast .toast-title { font-weight: 700; margin-bottom: 6px; color: var(--text); font-size: 13px; }
  .upload-toast .toast-detail { color: var(--text-2); font-size: 12.5px; }
  .upload-toast .toast-detail ul { margin: 6px 0 0 0; padding-left: 20px; }
  .upload-toast .toast-detail li { margin-bottom: 3px; }
  .upload-toast .toast-close { float: right; cursor: pointer; color: var(--text-3); margin-left: 12px; font-size: 16px; line-height: 1; padding: 0 2px; }
  .upload-toast .toast-close:hover { color: var(--text); }

  /* Content */
  .content { max-width: 1600px; margin: 0 auto; padding: 24px 40px 60px; }
  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

  .section-h { font-family: 'Manrope', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; color: var(--text); }
  .section-sub { color: var(--text-2); font-size: 13px; line-height: 1.55; }
  .section-sub strong { color: var(--text); font-weight: 700; }
  .section-head { display: flex; align-items: baseline; flex-wrap: wrap; gap: 18px; margin-bottom: 20px; padding-top: 4px; }
  .section-head .section-h { flex-shrink: 0; }
  .section-head .section-sub { flex: 1; min-width: 0; }

  /* Sticky head — title + filters stay visible when table scrolls */
  .sticky-head {
    position: sticky;
    top: 64px;
    z-index: 50;
    background: var(--bg);
    margin: -16px -40px 16px -40px;
    padding: 16px 40px 14px 40px;
    border-bottom: 1px solid var(--border);
  }
  .sticky-head .section-head { margin-bottom: 14px; padding-top: 0; }
  .sticky-head .steps-controls,
  .sticky-head .subtabs { margin-bottom: 0; }
  .sticky-head .subtabs { border-bottom: none; }

  /* KPI */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0; margin-bottom: 56px; border: 1px solid var(--border); }
  .kpi { background: var(--surface); padding: 28px 28px; position: relative; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .kpi:last-child { border-right: none; }
  .kpi.clickable { cursor: pointer; transition: background 0.12s; }
  .kpi.clickable:hover { background: var(--surface-2); }
  .kpi.clickable:hover .kpi-label { color: var(--accent); }
  .kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; font-weight: 600; transition: color 0.12s; }
  .kpi-value { font-family: 'Manrope', sans-serif; font-size: 48px; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -0.03em; }
  .kpi.accent .kpi-value { color: var(--accent); }
  .kpi.danger .kpi-value { color: var(--blocker); }
  .kpi-detail { font-size: 12px; color: var(--text-2); margin-top: 10px; font-weight: 500; }

  .card { background: var(--surface); border: 1px solid var(--border); padding: 28px 32px; margin-bottom: 20px; }
  .card-h { font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 22px; color: var(--text-3); }

  /* Tables */
  .data-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--border); }
  .data-table thead th {
    background: var(--surface);
    text-align: left;
    padding: 14px 16px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-3);
    border-bottom: 1px solid var(--border-strong);
    font-family: 'JetBrains Mono', monospace;
    position: sticky;
    top: var(--sticky-head-h, 64px);
    z-index: 5;
  }
  .data-table tbody td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13px; }
  .data-table tbody tr:last-child td { border-bottom: none; }
  .data-table tbody tr:hover { background: var(--surface-2); }
  .data-table tbody tr.clickable { cursor: pointer; }

  .kv-list { display: grid; grid-template-columns: 220px 1fr; gap: 0; border: 1px solid var(--border); }
  .kv-list > div { padding: 14px 18px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .kv-list > div:nth-last-child(-n+2) { border-bottom: none; }
  .kv-list .kv-k { background: var(--surface-2); font-weight: 600; color: var(--text-2); border-right: 1px solid var(--border); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  /* Tags */
  .gate { display: inline-block; padding: 3px 8px; border-radius: var(--r-sm); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; border: 1px solid; white-space: nowrap; }
  .gate-G1 { background: var(--g1-bg); color: var(--g1); border-color: var(--g1-border); }
  .gate-G2 { background: var(--g2-bg); color: var(--g2); border-color: var(--g2-border); }
  .gate-G3 { background: var(--g3-bg); color: var(--g3); border-color: var(--g3-border); }
  .gate-mixed { background: linear-gradient(90deg, var(--g1-bg) 50%, var(--g2-bg) 50%); color: var(--text); border-color: var(--border-strong); }

  .chip { display: inline-block; padding: 3px 8px; border-radius: var(--r-sm); font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); white-space: nowrap; font-weight: 500; }
  .chip.clickable { cursor: pointer; transition: all 0.12s; }
  .chip.clickable:hover { background: var(--text); color: var(--surface); border-color: var(--text); }
  .chip-step { background: var(--accent-soft); border-color: var(--accent-tint); color: var(--accent); font-weight: 600; }
  .chip-step.clickable:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip-dict { font-size: 11.5px; padding: 4px 10px; }
  .chip-blocker { background: var(--blocker-bg); color: var(--blocker); border-color: var(--blocker); font-weight: 700; }
  .chip-warn { background: var(--warn-bg); color: var(--warn); border-color: var(--warn); }
  .chip-list { display: flex; flex-wrap: wrap; gap: 5px; }

  /* Filters */
  .steps-controls { display: flex; gap: 14px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); font-family: 'JetBrains Mono', monospace; font-weight: 700; margin-right: 4px; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 12px; font-size: 12px; color: var(--text-2); font-weight: 600; transition: all 0.12s; font-family: 'Manrope', sans-serif; }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: var(--surface); }
  .results-count { margin-left: auto; color: var(--text-3); font-size: 11px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em; font-weight: 600; }

  /* Steps */
  .step-row .step-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; color: var(--text); width: 40px; }
  .step-row .step-name { font-weight: 600; color: var(--text); }
  .step-row .step-link { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'JetBrains Mono', monospace; }

  /* Cards */
  .cards-layout { display: grid; grid-template-columns: 320px 1fr; gap: 32px; }
  .cards-list { background: var(--surface); border: 1px solid var(--border); overflow-y: auto; }
  .card-item { width: 100%; text-align: left; background: none; border: none; padding: 14px 18px; border-bottom: 1px solid var(--border); transition: all 0.1s; display: flex; align-items: flex-start; gap: 12px; color: var(--text-2); font-size: 13px; line-height: 1.4; font-weight: 500; }
  .card-item:last-child { border-bottom: none; }
  .card-item:hover { background: var(--surface-2); color: var(--text); }
  .card-item.active { background: var(--text); color: var(--surface); font-weight: 600; }
  .card-item .item-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; min-width: 24px; color: var(--text-3); font-size: 12px; padding-top: 1px; }
  .card-item.active .item-num { color: var(--surface); }
  .card-detail { background: var(--surface); border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .card-detail-head { padding: 32px 44px 24px 44px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .card-detail-body { padding: 28px 44px 32px 44px; overflow-y: auto; flex: 1; min-height: 0; }
  .card-detail-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; font-weight: 700; }
  .card-detail-title { font-family: 'Manrope', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.15; margin-bottom: 16px; color: var(--text); }
  .card-detail-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .card-field { margin-bottom: 24px; }
  .card-field:last-child { margin-bottom: 0; }
  .card-field-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); font-weight: 700; margin-bottom: 10px; }
  .card-field-value { font-size: 14px; line-height: 1.65; color: var(--text); }
  .actions-list { display: flex; flex-direction: column; gap: 8px; counter-reset: action-counter; }
  .actions-list .action { padding: 12px 16px; background: var(--surface-2); border-left: 2px solid var(--border-strong); font-size: 13.5px; line-height: 1.55; color: var(--text); counter-increment: action-counter; position: relative; padding-left: 44px; }
  .actions-list .action::before { content: counter(action-counter); position: absolute; left: 14px; top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text-3); }
  .actions-list .action.auto { border-left-color: var(--g2); }
  .actions-list .action.human { border-left-color: var(--g1); }
  .action-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 6px; margin-right: 8px; letter-spacing: 0.06em; }
  .action-tag.auto { background: var(--g2-bg); color: var(--g2); }
  .action-tag.human { background: var(--g1-bg); color: var(--g1); }

  .subtabs { display: flex; gap: 28px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .subtab { background: none; border: none; padding: 10px 0; font-size: 12px; color: var(--text-3); border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 700; transition: all 0.12s; text-transform: uppercase; letter-spacing: 0.08em; }
  .subtab:hover { color: var(--text); }
  .subtab.active { color: var(--text); border-bottom-color: var(--accent); }
  .dict-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; color: var(--text); }
  .dict-name.clickable:hover { color: var(--accent); }

  /* Dictionary accordion */
  .dict-row { cursor: pointer; transition: background 0.12s; }
  .dict-row.expanded { background: var(--surface-2); }
  .dict-row .dict-chevron { display: inline-block; width: 12px; height: 12px; margin-right: 8px; transition: transform 0.18s ease; color: var(--text-3); vertical-align: -1px; }
  .dict-row.expanded .dict-chevron { transform: rotate(90deg); color: var(--accent); }
  .dict-detail-row td { padding: 0 !important; border-bottom: 1px solid var(--border) !important; }
  .dict-detail-row .dict-detail {
    padding: 24px 32px 28px 32px;
    background: var(--surface-2);
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 28px;
  }
  .dict-detail-purpose { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 18px; }
  .dict-detail-meta { font-size: 12px; color: var(--text-2); margin-bottom: 22px; }
  .dict-detail-meta strong { color: var(--text); font-weight: 700; }
  .dict-section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); font-weight: 700; margin-bottom: 10px; }
  .dict-fields-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--border); margin-bottom: 18px; font-size: 12.5px; }
  .dict-fields-table th { background: var(--surface); text-align: left; padding: 9px 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; color: var(--text-3); border-bottom: 1px solid var(--border-strong); position: static; }
  .dict-fields-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .dict-fields-table tr:last-child td { border-bottom: none; }
  .dict-fields-table .field-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text); white-space: nowrap; }
  .dict-fields-table .field-source { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-2); white-space: nowrap; }
  .dict-list { list-style: none; padding: 0; margin: 0 0 16px 0; }
  .dict-list li { padding: 7px 0 7px 18px; position: relative; font-size: 13px; line-height: 1.5; border-bottom: 1px dashed var(--border); }
  .dict-list li:last-child { border-bottom: none; }
  .dict-list li::before { content: '—'; position: absolute; left: 0; top: 7px; color: var(--text-3); font-weight: 600; }
  .dict-list.todo li::before { content: '!'; color: var(--accent); font-weight: 800; }
  .dict-list.todo li { color: var(--text); }
  .dict-empty { color: var(--text-3); font-size: 12px; font-style: italic; }
  @media (max-width: 980px) {
    .dict-detail-row .dict-detail { grid-template-columns: 1fr; gap: 18px; padding: 18px 16px; }
  }

  /* Graph */
  .graph-wrap { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
  .graph-toolbar { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center; flex-shrink: 0; }
  .graph-toolbar .graph-title { font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; margin-right: 16px; }
  .graph-toolbar .hint { margin-left: auto; font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }
  .graph-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; color: var(--text); font-size: 14px; font-weight: 700; transition: all 0.12s; font-family: 'JetBrains Mono', monospace; }
  .graph-btn:hover { background: var(--text); color: var(--surface); border-color: var(--text); }
  .graph-zoom-level { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); padding: 0 10px; min-width: 56px; text-align: center; font-weight: 600; }
  .graph-viewport { position: relative; overflow: hidden; flex: 1; min-height: 280px; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; background-color: var(--surface-2); cursor: grab; user-select: none; }
  .graph-viewport.dragging { cursor: grabbing; }
  .graph-viewport img { position: absolute; top: 0; left: 0; transform-origin: 0 0; max-width: none; will-change: transform; }
  .graph-legend { padding: 10px 16px; background: var(--surface-2); border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-2); flex-shrink: 0; }
  .graph-legend .legend-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; row-gap: 4px; }
  .legend-swatch { display: inline-block; width: 10px; height: 10px; vertical-align: middle; margin-right: 6px; }

  /* Fullscreen tabs — overview & graph fit the viewport exactly */
  body.tab-fullscreen { overflow: hidden; }
  body.tab-fullscreen .content { padding: 16px 40px 16px; height: calc(100vh - 65px); display: flex; flex-direction: column; max-width: none; }
  body.tab-fullscreen .panel.active { display: flex; flex-direction: column; flex: 1; min-height: 0; max-width: 1600px; margin: 0 auto; width: 100%; }

  /* Graph wrap fills the remaining height */
  body.tab-fullscreen #panel-graph .graph-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  /* Cards tab — heading static, list scrolls independently, detail header static, detail body scrolls */
  body.tab-fullscreen #panel-cards .sticky-head { position: static; margin: 0 0 16px 0; padding: 0; background: transparent; border-bottom: none; flex-shrink: 0; }
  body.tab-fullscreen #panel-cards .cards-layout { flex: 1; min-height: 0; }
  body.tab-fullscreen #panel-cards .cards-list { max-height: 100%; }

  /* Overview — compact layout that fits in viewport */
  body.tab-fullscreen #panel-overview .section-head { flex-shrink: 0; margin-bottom: 16px; }
  body.tab-fullscreen #panel-overview .grid-2 { flex: 1; min-height: 0; gap: 16px; }
  body.tab-fullscreen #panel-overview .card { margin-bottom: 0; padding: 18px 22px; overflow: auto; display: flex; flex-direction: column; }
  body.tab-fullscreen #panel-overview .card-h { margin-bottom: 12px; flex-shrink: 0; }
  body.tab-fullscreen #panel-overview .kv-list { font-size: 12px; }
  body.tab-fullscreen #panel-overview .kv-list > div { padding: 9px 14px; }
  body.tab-fullscreen #panel-overview .data-table tbody td { padding: 10px 14px; font-size: 12px; }
  body.tab-fullscreen #panel-overview .data-table thead th { padding: 9px 14px; position: static; }

  /* Projects */
  .project-card { background: var(--surface); border: 1px solid var(--border); padding: 28px 30px; }
  .project-code { font-family: 'Manrope', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 16px; letter-spacing: -0.02em; }
  .project-id-row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 16px; }
  .project-id-row:last-child { border-bottom: none; }
  .project-id-row .id-k { color: var(--text-3); font-family: 'JetBrains Mono', monospace; min-width: 130px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding-top: 3px; font-weight: 700; }
  .project-id-row .id-v { color: var(--text); font-family: 'JetBrains Mono', monospace; word-break: break-all; font-weight: 500; }

  /* Endpoints */
  .endpoint-row .endpoint-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); background: var(--surface-2); padding: 4px 8px; border: 1px solid var(--border); display: inline-block; font-weight: 500; }
  .endpoint-row .endpoint-empty { font-style: italic; color: var(--text-3); font-size: 12px; }

  /* Questions */
  .question-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border-strong); padding: 20px 24px; margin-bottom: 12px; transition: all 0.12s; }
  .question-card:hover { border-color: var(--border-strong); }
  .question-card.blocker { border-left-color: var(--blocker); }
  .question-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .question-id { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; color: var(--text); letter-spacing: 0.02em; }
  .question-id.blocker { color: var(--blocker); }
  .question-object { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-2); background: var(--surface-2); padding: 3px 8px; border: 1px solid var(--border); }
  .question-desc { font-size: 14px; color: var(--text); margin-bottom: 10px; line-height: 1.55; }
  .question-meta { font-size: 12px; color: var(--text-2); display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .question-meta span strong { color: var(--text); font-weight: 700; }

  /* Search */
  .search-results { background: var(--surface); border: 1px solid var(--border); padding: 28px 32px; }
  .search-group { margin-bottom: 28px; }
  .search-group:last-child { margin-bottom: 0; }
  .search-group-h { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); margin-bottom: 12px; font-weight: 700; }
  .search-hit { padding: 14px 18px; background: var(--surface-2); margin-bottom: 6px; cursor: pointer; transition: all 0.12s; font-size: 13px; line-height: 1.5; border-left: 2px solid transparent; }
  .search-hit:hover { background: var(--accent-soft); border-left-color: var(--accent); }
  .search-hit mark { background: var(--accent); color: #fff; padding: 0 3px; font-weight: 600; }
  .search-hit-path { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; letter-spacing: 0.04em; font-weight: 600; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(10, 10, 10, 0.4); display: none; align-items: flex-start; justify-content: center; z-index: 200; padding: 60px 20px; overflow-y: auto; backdrop-filter: blur(3px); }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); max-width: 720px; width: 100%; border: 1px solid var(--border); box-shadow: 0 24px 48px rgba(10, 10, 10, 0.16); animation: modalIn 0.18s ease; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .modal-head { padding: 22px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .modal-title { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .modal-close { background: none; border: 1px solid var(--border); border-radius: var(--r-sm); width: 30px; height: 30px; font-size: 18px; color: var(--text-2); line-height: 1; cursor: pointer; transition: all 0.12s; }
  .modal-close:hover { background: var(--text); color: var(--surface); border-color: var(--text); }
  .modal-body { padding: 28px; }
  .modal-body .field-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); font-weight: 700; margin-bottom: 8px; }

  .text-mono { font-family: 'JetBrains Mono', monospace; }
  .text-2 { color: var(--text-2); }
  .text-3 { color: var(--text-3); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  @media (max-width: 980px) {
    .grid-2 { grid-template-columns: 1fr; }
    .cards-layout { grid-template-columns: 1fr; }
    .cards-list { position: static; max-height: 320px; }
    .content { padding: 32px 20px 60px; }
    .topbar { padding: 0 20px; }
    .topbar-row { flex-wrap: wrap; min-height: auto; gap: 12px; padding: 12px 0; }
    .tabs { width: 100%; }
    .section-h { font-size: 28px; }
    .card-detail-title { font-size: 24px; }
    .card-detail { padding: 24px 22px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-row">
    <div class="logo">
      <div class="logo-mark">ФСК</div>
      <div class="brand-meta">
        <div class="brand-eyebrow">Pyrus BPMS · ЗНН_У-5</div>
        <div class="brand-title">Пилот 13 шагов</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="topbar-actions">
      <input type="file" id="file-input" accept=".xlsx" style="display:none">
      <button class="topbar-btn" id="btn-upload" title="Загрузить xlsx-шаблон с обновлёнными данными">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Загрузить</span>
      </button>
      <button class="topbar-btn topbar-btn-primary" id="btn-download" style="display:none" title="Скачать обновлённый html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Скачать html</span>
      </button>
    </div>
  </div>
</header>

<div class="upload-toast" id="upload-toast"></div>

<main class="content">
  <div id="panel-overview" class="panel"></div>
  <div id="panel-steps" class="panel"></div>
  <div id="panel-cards" class="panel"></div>
  <div id="panel-dictionaries" class="panel"></div>
  <div id="panel-graph" class="panel"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const gateClass = g => {
  if (!g) return 'gate';
  if (g.includes('G1') && g.includes('G2')) return 'gate gate-mixed';
  if (g.includes('G2') && g.includes('G3')) return 'gate gate-mixed';
  if (g.includes('G1')) return 'gate gate-G1';
  if (g.includes('G2')) return 'gate gate-G2';
  if (g.includes('G3')) return 'gate gate-G3';
  return 'gate';
};

const parseStepsList = (s) => {
  if (!s) return [];
  s = String(s);
  if (/^все$/i.test(s.trim())) return Array.from({length: DATA.steps.length}, (_, i) => i + 1);
  const out = new Set();
  for (const part of s.split(/[,;]/)) {
    const p = part.trim();
    const range = p.match(/^(\d+)\s*[-–—]\s*(\d+)$/);
    if (range) { for (let i = +range[1]; i <= +range[2]; i++) out.add(i); }
    else { const num = parseInt(p, 10); if (!isNaN(num)) out.add(num); }
  }
  return [...out].sort((a, b) => a - b);
};

const declension = (n, forms) => {
  const m = Math.abs(n) % 100;
  if (m >= 11 && m <= 14) return forms[2];
  const m1 = m % 10;
  if (m1 === 1) return forms[0];
  if (m1 >= 2 && m1 <= 4) return forms[1];
  return forms[2];
};

const TABS = [
  { id: 'overview', label: 'Обзор' },
  { id: 'steps', label: '13 шагов' },
  { id: 'cards', label: 'Карточки' },
  { id: 'dictionaries', label: 'Справочники' },
  { id: 'graph', label: 'Граф' }
];

let activeTab = 'overview';
let activeCardNum = 1;

function counts() {
  return {
    steps: DATA.steps.length,
    cards: DATA.steps.length,
    dictionaries: DATA.dictionaries.length + DATA.roles.length,
    projects: DATA.projects.length,
    endpoints: DATA.endpoints.length,
    questions: DATA.questions.length
  };
}

function renderTabs() {
  const c = counts();
  const tabsEl = $('#tabs');
  tabsEl.innerHTML = '';
  TABS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'tab' + (activeTab === t.id ? ' active' : '');
    const count = c[t.id];
    b.innerHTML = `${esc(t.label)}${count != null ? `<span class="tab-count">${count}</span>` : ''}`;
    b.addEventListener('click', () => switchTab(t.id));
    tabsEl.appendChild(b);
  });
}

// Measure the active panel's .sticky-head and expose its bottom offset
// so table headers can stick directly below it without overlap.
function updateStickyHeadHeight() {
  const head = document.querySelector('.panel.active .sticky-head');
  const topbarH = document.querySelector('.topbar')?.offsetHeight || 64;
  if (head) {
    const total = topbarH + head.offsetHeight;
    document.documentElement.style.setProperty('--sticky-head-h', total + 'px');
  } else {
    document.documentElement.style.setProperty('--sticky-head-h', topbarH + 'px');
  }
}

function switchTab(id, opts = {}) {
  activeTab = id;
  const fullscreen = (id === 'graph' || id === 'overview' || id === 'cards');
  document.body.classList.toggle('tab-fullscreen', fullscreen);
  $$('.panel').forEach(p => p.classList.remove('active'));
  const panel = $('#panel-' + id);
  if (panel) panel.classList.add('active');
  renderTabs();
  if (opts.cardNum) activeCardNum = opts.cardNum;
  if (id === 'cards') renderCards();
  if (id === 'graph') {
    requestAnimationFrame(() => { if (window._graphFit) window._graphFit(); });
  }
  requestAnimationFrame(updateStickyHeadHeight);
  if (!fullscreen) window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== STEPS ==========
let stepsFilters = { gate: null, phase: null };
const GATE_OPTIONS = ['G1', 'G1–G2', 'G2', 'G2→G3', 'G3'];

function renderSteps() {
  const phases = [...new Set(DATA.steps.map(s => s.phase))].filter(Boolean);
  let filtered = DATA.steps;
  if (stepsFilters.gate) filtered = filtered.filter(s => s.gate === stepsFilters.gate);
  if (stepsFilters.phase) filtered = filtered.filter(s => s.phase === stepsFilters.phase);

  const rows = filtered.map(s => `
    <tr class="step-row clickable" data-step="${s.num}">
      <td class="step-num">${s.num}</td>
      <td><span class="step-name">${esc(s.name)}</span></td>
      <td><span class="${gateClass(s.gate)}">${esc(s.gate)}</span></td>
      <td>${esc(s.phase || '—')}</td>
      <td class="text-2" style="font-size:12px">${esc(s.systems || '—')}</td>
      <td style="text-align:right;white-space:nowrap"><a class="step-link">открыть →</a></td>
    </tr>
  `).join('');

  $('#panel-steps').innerHTML = `
    <div class="sticky-head">
      <div class="section-head">
        <h2 class="section-h">${DATA.steps.length} ${declension(DATA.steps.length, ['шаг','шага','шагов'])}</h2>
        <p class="section-sub">Сводная таблица пилотного процесса. <span class="gate gate-G1">G1</span> <span class="gate gate-G2">G2</span> <span class="gate gate-G3">G3</span> — цвет бейджа гейта. Клик по строке открывает карточку.</p>
      </div>
      <div class="steps-controls">
        <div class="filter-group">
          <span class="filter-label">Гейт</span>
          <button class="filter-btn ${!stepsFilters.gate ? 'active' : ''}" data-gate="">Все</button>
          ${GATE_OPTIONS.map(g => `<button class="filter-btn ${stepsFilters.gate === g ? 'active' : ''}" data-gate="${esc(g)}">${esc(g)}</button>`).join('')}
        </div>
        <div class="filter-group">
          <span class="filter-label">Фаза</span>
          <select class="filter-select" id="phase-filter">
            <option value="">Все фазы</option>
            ${phases.map(p => `<option value="${esc(p)}" ${stepsFilters.phase === p ? 'selected' : ''}>${esc(p)}</option>`).join('')}
          </select>
        </div>

function parseActions(actionsText) {
  if (!actionsText) return [];
  // New format: each action on its own line
  const lines = actionsText.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  return lines.map(line => {
    // Strip any leading "N)" if present (legacy compatibility)
    line = line.replace(/^\d+\)\s*/, '');
    const isAuto = /^Авт\.?:/i.test(line);
    const isHuman = /^Чел\.?:/i.test(line);
    return { text: line, kind: isAuto ? 'auto' : (isHuman ? 'human' : 'mixed') };
  });
}

function chipsFromDicts(dictsStr) {
  if (!dictsStr) return '<span class="text-3">—</span>';
  const items = [];
  let depth = 0, buf = '';
  for (const ch of dictsStr) {
    if (ch === '(') depth++;
    if (ch === ')') depth--;
    if (ch === ',' && depth === 0) { items.push(buf.trim()); buf = ''; } else buf += ch;
  }
  if (buf.trim()) items.push(buf.trim());
  return items.map(it => {
    const name = it.match(/^FSK_[А-Яа-яA-Za-z]+/)?.[0] || it.split(/\s|\(/)[0];
    return `<span class="chip chip-dict clickable" data-dict="${esc(name)}">${esc(it)}</span>`;
  }).join('');
}

// Convert "FSK_Проекты" mentions to clickable chips that expand that dictionary
function linkifyFskRefs(text) {
  const dictNames = new Set(DATA.dictionaries.map(d => d.name));
  // Match FSK_<letters> (Cyrillic or Latin)
  return esc(text).replace(/FSK_[А-Яа-яA-Za-zЁё]+/g, m => {
    if (dictNames.has(m)) {
      return `<span class="chip chip-dict clickable" data-dict-jump="${esc(m)}">${esc(m)}</span>`;
    }
    return m;
  });
}

let graphState = { scale: 1, x: 0, y: 0, minScale: 0.15, maxScale: 5, naturalW: 0, naturalH: 0 };

function renderGraph() {
  $('#panel-graph').innerHTML = `
    <div class="graph-wrap">
      <div class="graph-toolbar">
        <span class="graph-title">Граф связей FSK_*</span>
        <button class="graph-btn" id="g-out" title="Уменьшить">−</button>
        <span class="graph-zoom-level" id="g-zoom">—</span>
        <button class="graph-btn" id="g-in" title="Увеличить">+</button>
        <button class="graph-btn" id="g-fit" title="Вписать" style="width:auto;padding:0 10px;font-size:11px">FIT</button>
        <button class="graph-btn" id="g-100" title="100%" style="width:auto;padding:0 10px;font-size:11px">1:1</button>
        <span class="hint">scroll · drag · dblclick</span>
      </div>
      <div class="graph-viewport" id="g-view">
        <img id="g-img" src="data:image/webp;base64,${IMG_B64}" alt="ER-диаграмма">
      </div>
      <div class="graph-legend">
        <div class="legend-row">
          <span><span class="legend-swatch" style="background:#FEF3C7;border:1px solid #FCD34D"></span>Объекты</span>
          <span><span class="legend-swatch" style="background:#A78BFA;border:1px solid #8B5CF6"></span>Операционные</span>
          <span><span class="legend-swatch" style="background:#5EEAD4;border:1px solid #14B8A6"></span>Документация</span>
          <span><span class="legend-swatch" style="background:#FFFFFF;border:1.5px solid #DC2626"></span>Тендерные</span>
          <span><span class="legend-swatch" style="background:#FFFFFF;border:1px solid #9C9A93"></span>Классификаторы</span>
        </div>
      </div>
    </div>
  `;

  const view = $('#g-view'), img = $('#g-img'), zoomLabel = $('#g-zoom');
  function applyTransform() {
    img.style.transform = `translate(${graphState.x}px, ${graphState.y}px) scale(${graphState.scale})`;
    zoomLabel.textContent = Math.round(graphState.scale * 100) + '%';
  }
  function fitToView() {
    const vw = view.clientWidth, vh = view.clientHeight;
    const sx = vw / graphState.naturalW, sy = vh / graphState.naturalH;
    graphState.scale = Math.min(sx, sy) * 0.96;
    graphState.x = (vw - graphState.naturalW * graphState.scale) / 2;
    graphState.y = (vh - graphState.naturalH * graphState.scale) / 2;
    applyTransform();
  }
  function setZoom(newScale, cx, cy) {
    newScale = Math.max(graphState.minScale, Math.min(graphState.maxScale, newScale));
    if (cx == null) { cx = view.clientWidth / 2; cy = view.clientHeight / 2; }
    const ix = (cx - graphState.x) / graphState.scale, iy = (cy - graphState.y) / graphState.scale;
    graphState.scale = newScale;
    graphState.x = cx - ix * newScale;
    graphState.y = cy - iy * newScale;
    applyTransform();
  }
  img.onload = () => { graphState.naturalW = img.naturalWidth; graphState.naturalH = img.naturalHeight; fitToView(); };
  if (img.complete && img.naturalWidth) img.onload();

  // Expose fit function so tab-switching and resize can refit
  window._graphFit = fitToView;

  view.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = view.getBoundingClientRect();
    setZoom(graphState.scale * (1 + (-e.deltaY * 0.0015)), e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });

  let dragging = false, dragStart = null;
  view.addEventListener('mousedown', (e) => { dragging = true; dragStart = { x: e.clientX, y: e.clientY, gx: graphState.x, gy: graphState.y }; view.classList.add('dragging'); });
  window.addEventListener('mousemove', (e) => { if (!dragging) return; graphState.x = dragStart.gx + (e.clientX - dragStart.x); graphState.y = dragStart.gy + (e.clientY - dragStart.y); applyTransform(); });
  window.addEventListener('mouseup', () => { dragging = false; view.classList.remove('dragging'); });

  let touchState = null;
  view.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) touchState = { type: 'pan', x: e.touches[0].clientX, y: e.touches[0].clientY, gx: graphState.x, gy: graphState.y };
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      touchState = { type: 'pinch', dist: Math.hypot(dx, dy), scale: graphState.scale };
    }
  }, { passive: true });
  view.addEventListener('touchmove', (e) => {
    if (!touchState) return;
    e.preventDefault();
    if (touchState.type === 'pan' && e.touches.length === 1) {
      graphState.x = touchState.gx + (e.touches[0].clientX - touchState.x);
      graphState.y = touchState.gy + (e.touches[0].clientY - touchState.y);
      applyTransform();
    } else if (touchState.type === 'pinch' && e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const rect = view.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      setZoom(touchState.scale * (Math.hypot(dx, dy) / touchState.dist), cx, cy);
    }
  }, { passive: false });
  view.addEventListener('touchend', () => { touchState = null; });
  view.addEventListener('dblclick', fitToView);

  $('#g-in').addEventListener('click', () => setZoom(graphState.scale * 1.25));
  $('#g-out').addEventListener('click', () => setZoom(graphState.scale / 1.25));
  $('#g-fit').addEventListener('click', fitToView);
  $('#g-100').addEventListener('click', () => setZoom(1));
}

function showUploadToast(kind, title, detail) {

// Helpers for parsing sheet rows
const cellStr = (v) => (v == null || v === undefined) ? '' : String(v).trim();
const cellInt = (v) => {
  if (v == null || v === '') return null;
  const n = parseInt(v, 10);
  return isNaN(n) ? null : n;
};

function parseSheet(workbook, sheetName) {
  const ws = workbook.Sheets[sheetName];
  if (!ws) return null;
  return XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
}

// Find header row in flat sheet (Шаги, Роли) — row that contains the first expected column
function findHeaderRow(rows, expectedFirstCol) {
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    if (cellStr(rows[i][0]) === expectedFirstCol) return i;
  }
  return -1;
}

function parseStepsSheet(rows) {
  const hdr = findHeaderRow(rows, '№');
  if (hdr < 0) throw new Error('Лист «Шаги»: не найдена строка заголовков с колонкой «№»');
  const result = [];
  for (let i = hdr + 1; i < rows.length; i++) {
    const r = rows[i];
    const num = cellInt(r[0]);
    if (num == null) continue;
    result.push({
      num,
      name: cellStr(r[1]),
      gate: cellStr(r[2]),
      phase: cellStr(r[3]),
      regulation: cellStr(r[4]),
      systems: cellStr(r[5]),
      participants: cellStr(r[6]),
      entities: cellStr(r[7]),
      actions: cellStr(r[8]),
      dictionaries: cellStr(r[9])
    });
  }
  if (!result.length) throw new Error('Лист «Шаги»: не найдено ни одной строки данных');
  return result;
}

function parseRolesSheet(rows) {
  const hdr = findHeaderRow(rows, 'Роль');
  if (hdr < 0) throw new Error('Лист «Роли»: не найдена строка заголовков с колонкой «Роль»');
  const result = [];
  for (let i = hdr + 1; i < rows.length; i++) {
    const r = rows[i];
    const role = cellStr(r[0]);
    if (!role) continue;
    result.push({
      role,
      description: cellStr(r[1]),
      steps: cellStr(r[2])
    });
  }
  if (!result.length) throw new Error('Лист «Роли»: не найдено ни одной строки данных');
  return result;
}

function parseDictSheet(sheetName, rows) {
  // Format: title row, then key-value rows for Назначение / Применение в шагах,
  // then section headers, fields table, bullet lists.
  const detail = {
    name: '',
    short_name: sheetName,
    purpose: '',
    applies_to_steps: '',
    fields: [],
    relations: [],
    todo: []
  };

  // Extract FSK name from title row: "Справочник №N: FSK_Name"
  for (let i = 0; i < Math.min(rows.length, 3); i++) {
    const c0 = cellStr(rows[i][0]);
    const m = c0.match(/Справочник\s*№?\s*\d*\s*:?\s*(FSK_[А-Яа-яA-Za-zЁё]+)/);
    if (m) { detail.name = m[1]; break; }
  }
  if (!detail.name) {
    // Fallback: assume FSK_<sheetName>
    detail.name = 'FSK_' + sheetName;
  }

  let section = 'header';
  let inFieldsTable = false;

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const c0 = cellStr(r[0]);
    const c1 = cellStr(r[1]);
    const c2 = cellStr(r[2] || '');

    if (!c0 && !c1 && !c2) { inFieldsTable = false; continue; }

    if (c0 === 'Назначение') { detail.purpose = c1; continue; }
    if (c0 === 'Применение в шагах') { detail.applies_to_steps = c1; continue; }

    if (c0 === 'ПОЛЯ И ИСТОЧНИКИ ДАННЫХ') { section = 'fields'; inFieldsTable = false; continue; }
    if (c0 === 'СВЯЗИ С ДРУГИМИ СПРАВОЧНИКАМИ') { section = 'relations'; inFieldsTable = false; continue; }
    if (c0 === 'ЧТО ТРЕБУЕТСЯ ПОЛУЧИТЬ ОТ ФСК') { section = 'todo'; inFieldsTable = false; continue; }

    if (c0 === 'Поле' && c1 === 'Что хранит') { inFieldsTable = true; continue; }

    if (section === 'fields' && inFieldsTable && c0 && !c0.startsWith('—')) {
      detail.fields.push({ name: c0, desc: c1, source: c2 });
    } else if (section === 'relations' && c0.startsWith('•')) {
      detail.relations.push(c0.replace(/^•\s*/, ''));
    } else if (section === 'todo' && c0.startsWith('•')) {
      detail.todo.push(c0.replace(/^•\s*/, ''));
    }
  }
  return detail;
}

// Sheet names that are NOT dictionary sheets
const NON_DICT_SHEETS = new Set(['О шаблоне', 'Шаги', 'Роли']);

async function handleFile(file) {
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.xlsx')) {
    showUploadToast('error', 'Нужен файл .xlsx', 'Загруженный файл не похож на Excel-таблицу.');
    return;
  }

  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: false });

    // Required sheets
    const requiredSheets = ['Шаги', 'Роли'];
    const missing = requiredSheets.filter(s => !wb.SheetNames.includes(s));
    if (missing.length) {
      showUploadToast('error', 'Не хватает листов', 'В файле отсутствуют обязательные листы: <strong>' + missing.join(', ') + '</strong>');
      return;
    }

    // Parse Шаги
    let steps, roles;
    try { steps = parseStepsSheet(parseSheet(wb, 'Шаги')); }
    catch (e) { showUploadToast('error', 'Ошибка в листе «Шаги»', esc(e.message)); return; }

    try { roles = parseRolesSheet(parseSheet(wb, 'Роли')); }
    catch (e) { showUploadToast('error', 'Ошибка в листе «Роли»', esc(e.message)); return; }

    // Parse all dictionary sheets
    const dicts = [];
    for (const sheetName of wb.SheetNames) {
      if (NON_DICT_SHEETS.has(sheetName)) continue;
      const rows = parseSheet(wb, sheetName);
      const det = parseDictSheet(sheetName, rows);
      // Build "compatibility" fields for the panel
      const dict = {
        name: det.name,
        steps: det.applies_to_steps,
        role: det.purpose ? det.purpose.split('.')[0].trim() : '',
        purpose: det.purpose,
        applies_to_steps: det.applies_to_steps,
        fields: det.fields,
        relations: det.relations,
        todo: det.todo
      };
      dicts.push(dict);
    }
    if (!dicts.length) {
      showUploadToast('error', 'Нет справочников', 'В файле не найдено ни одного листа со справочником.');
      return;
    }

    // Update DATA
    DATA = {
      ...DATA,
      steps,
      roles,
      dictionaries: dicts,
      updated_at: new Date().toLocaleString('ru-RU', { timeZone: 'UTC' }) + ' UTC'
    };

    // Reset filters and view
    stepsFilters = { gate: null, phase: null };
    activeCardNum = (DATA.steps[0] || {}).num || 1;
    expandedDicts.clear();
    dictSubtab = 'dicts';

    // Re-render everything
    renderTabs();
    renderOverview();
    renderSteps();
    renderCards();
    renderDictionaries();
    if (activeTab !== 'graph') {
      const panel = $('#panel-' + activeTab);
      if (panel) panel.classList.add('active');
    }

    // Show download button
    $('#btn-download').style.display = 'inline-flex';

    showUploadToast('success', 'Данные загружены',
      `Шагов: <strong>${steps.length}</strong>, ролей: <strong>${roles.length}</strong>, справочников: <strong>${dicts.length}</strong>.<br>` +
      'Проверь данные на вкладках и нажми <strong>«Скачать html»</strong>, чтобы сохранить обновлённый файл.'
    );

  } catch (e) {
    console.error(e);
    showUploadToast('error', 'Не удалось прочитать файл', esc(e.message || String(e)));
  }
}

function downloadUpdatedHtml() {
  // Inject current DATA into the *current* HTML source and offer it for download
  const currentHtml = document.documentElement.outerHTML;
  // Find the DATA marker and replace it. We re-serialize DATA without the IMG.
  const dataJson = JSON.stringify(DATA);
  // The source DOM doesn't contain the original placeholder anymore — DATA is already inlined.
  // We need a robust replace: locate `let DATA = ` ... `;` in the script.
  // Easiest: replace from `let DATA = ` to the next `;\n` boundary.
  const re = /let DATA = (\{[\s\S]*?\});\s*\nconst IMG_B64/;
  const replaced = currentHtml.replace(re, 'let DATA = ' + dataJson + ';\nconst IMG_B64');

  if (replaced === currentHtml) {
    showUploadToast('error', 'Не удалось пересохранить файл', 'Не нашёл блок DATA в текущем HTML для замены.');
    return;
  }

  // Prepend doctype (outerHTML doesn't include it)
  const fullHtml = '<!DOCTYPE html>\n' + replaced;
  const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  showUploadToast('success', 'Файл скачан',
    'Сохранён как <strong>index.html</strong>. Замени им файл в репозитории Git — коллеги по той же ссылке увидят обновлённые данные.'
  );
}


// ========== INIT ==========
window.switchTab = switchTab;
window.closeModal = closeModal;

function init() {
  renderTabs();
  renderOverview();
  renderSteps();
  renderCards();
  renderDictionaries();
  renderGraph();
  switchTab('overview');

  $('#modal-close').addEventListener('click', closeModal);
  $('#modal').addEventListener('click', e => { if (e.target === $('#modal')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Upload / download bindings
  $('#btn-upload').addEventListener('click', () => $('#file-input').click());
  $('#file-input').addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) handleFile(f);
    e.target.value = ''; // allow re-uploading the same file
  });
  $('#btn-download').addEventListener('click', downloadUpdatedHtml);

  // Refit graph and recompute sticky-head height when viewport changes
  let _resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      if (activeTab === 'graph' && window._graphFit) window._graphFit();
      updateStickyHeadHeight();
    }, 120);
  });
}

window.addEventListener('DOMContentLoaded', init);
</script>
